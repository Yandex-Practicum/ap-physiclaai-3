; supervisord.conf — Practice_3
[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=Xvfb :99 -screen 0 1920x1080x24 -ac
autorestart=true
priority=100

[program:fluxbox]
command=fluxbox
environment=DISPLAY=":99"
autorestart=true
priority=200

[program:x11vnc]
command=x11vnc -display :99 -forever -nopw -shared -rfbport 5900 -listen 0.0.0.0
autorestart=true
priority=300

[program:novnc]
command=/usr/bin/websockify --web /usr/share/novnc/ 0.0.0.0:6080 localhost:5900
autorestart=true
priority=400
